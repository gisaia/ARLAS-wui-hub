<div class="menu_container">
  <mat-nav-list>
    @for (page of pages; track page) {
      <mat-list-item [matTooltip]="page?.name | translate" [routerLink]="page?.link"
        queryParamsHandling="preserve" [disabled]="page?.disabled" routerLinkActive="mat-accent">
        <mat-icon >{{ page?.icon }}</mat-icon>
      </mat-list-item>
    }
  </mat-nav-list>
</div>
